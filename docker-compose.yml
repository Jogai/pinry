version: '3.8'

services:
  pinry:
    build:
      context: .
      dockerfile: docker/Dockerfile.autobuild
    ports:
      - "80:80"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-real-secret-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - pinry_data:/data
    restart: unless-stopped

volumes:
  pinry_data:
